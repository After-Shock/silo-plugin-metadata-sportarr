services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: silo
      POSTGRES_PASSWORD: silo-smoke-only
      POSTGRES_DB: silo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silo -d silo"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  plugin-catalog:
    image: nginx:alpine
    volumes:
      - ${SMOKE_CATALOG_DIR:?SMOKE_CATALOG_DIR is required}:/usr/share/nginx/html:ro
    networks:
      sportarr_movie_e2e_net:
        aliases: [plugin-catalog]

  silo:
    image: ${SILO_IMAGE:?SILO_IMAGE is required}
    environment:
      MODE: integrated
      SECRET_KEY: ${SMOKE_SECRET_KEY:?SMOKE_SECRET_KEY is required}
      DATABASE_URL: postgres://silo:silo-smoke-only@postgres:5432/silo?sslmode=disable
      REDIS_URL: redis://redis:6379
      SILO_PLUGIN_CACHE_DIR: /var/lib/silo/plugins
    ports:
      - "127.0.0.1:${SILO_PORT:?SILO_PORT is required}:8080"
    volumes:
      - ${SMOKE_MEDIA_DIR:?SMOKE_MEDIA_DIR is required}:/media:ro
      - ${SMOKE_SILO_DATA_DIR:?SMOKE_SILO_DATA_DIR is required}:/var/lib/silo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      default: {}
      sportarr_movie_e2e_net:
        aliases: [silo]

networks:
  sportarr_movie_e2e_net:
    external: true
    name: ${SMOKE_NETWORK:-sportarr-movie-e2e-net}
